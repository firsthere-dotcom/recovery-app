<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Recovery — 3-Week Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f3efe6;
    --paper-2: #ece6d8;
    --ink: #2c2a26;
    --ink-soft: #716c62;
    --ink-faint: #9a9488;
    --line: #ddd5c5;
    --accent: #9a6b46;
    --accent-soft: #e9ddcd;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Spectral", Georgia, serif;
    font-size: 18px;
    line-height: 1.55;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 22px 96px;
  }

  /* ---- Top bar ---- */
  header.topbar {
    position: sticky;
    top: 0;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    z-index: 10;
  }
  .topbar-inner {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 22px 0;
  }
  .brand {
    font-size: 15px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .brand-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .sync {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .sync.err { color: #a4502f; }
  .reconnect-banner[hidden] { display: none; }
  .reconnect-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    max-width: 640px;
    margin: 0 auto;
    padding: 8px 22px;
    background: var(--accent-soft);
    border-top: 1px solid var(--line);
    font-size: 14px;
    color: var(--ink);
  }
  .reconnect-banner button {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 14px;
    min-height: 36px;
    padding: 0 14px;
    border-radius: 2px;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .fs-status {
    font-size: 15px;
    color: var(--ink-soft);
  }
  nav.views {
    display: flex;
    gap: 2px;
    margin-top: 12px;
  }
  nav.views button {
    flex: 1;
    min-width: 0;
    min-height: 44px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    font-family: inherit;
    font-size: 13.5px;
    letter-spacing: 0.01em;
    color: var(--ink-soft);
    cursor: pointer;
    padding: 4px 2px 10px;
    white-space: nowrap;
  }
  nav.views button.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }

  /* ---- Generic ---- */
  h1, h2, h3 { font-weight: 500; }
  p { margin: 0 0 14px; }
  .muted { color: var(--ink-soft); }
  .faint { color: var(--ink-faint); }
  .center { text-align: center; }

  /* ---- Start screen ---- */
  .start {
    margin-top: 64px;
    text-align: center;
  }
  .start h1 {
    font-size: 32px;
    margin: 0 0 8px;
    font-weight: 400;
  }
  .start .lede {
    color: var(--ink-soft);
    font-style: italic;
    max-width: 26em;
    margin: 0 auto 36px;
  }
  .btn {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 18px;
    min-height: 48px;
    padding: 0 26px;
    cursor: pointer;
    border-radius: 2px;
  }
  .btn.ghost {
    background: none;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .start .alt {
    margin-top: 26px;
    font-size: 15px;
    color: var(--ink-soft);
  }
  .start input[type="date"] {
    font-family: inherit;
    font-size: 16px;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 10px;
    border-radius: 2px;
    margin-top: 8px;
  }

  /* ---- Day header ---- */
  .dayhead {
    margin-top: 24px;
  }
  .dayhead .week-label {
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }
  .dayhead h1 {
    font-size: 30px;
    margin: 4px 0 2px;
    font-weight: 400;
  }
  .dayhead .date {
    color: var(--ink-soft);
    font-style: italic;
  }
  .dayhead .phase {
    margin-top: 2px;
    color: var(--ink-soft);
  }

  /* ---- progress ---- */
  .progress {
    margin: 18px 0 6px;
  }
  .progress .bar {
    height: 6px;
    background: var(--paper-2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress .bar > i {
    display: block;
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.25s ease;
  }
  .progress .pct {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  /* ---- sections / checklist ---- */
  .section {
    margin-top: 30px;
  }
  .section > .section-title {
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .item {
    border-bottom: 1px solid var(--line);
    padding: 4px 0;
  }
  .check {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    min-height: 44px;
    padding: 8px 0;
    cursor: pointer;
  }
  .check input {
    appearance: none;
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    margin: 2px 0 0;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
    flex: 0 0 auto;
    cursor: pointer;
    position: relative;
    background: var(--paper);
  }
  .check input:checked { background: var(--accent); }
  .check input:checked::after {
    content: "";
    position: absolute;
    left: 8px;
    top: 3px;
    width: 5px;
    height: 11px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .check span { flex: 1; }
  .item.done .check span {
    color: var(--ink-faint);
    text-decoration: line-through;
    text-decoration-color: var(--ink-faint);
  }
  .item-note {
    display: block;
    width: 100%;
    font-family: inherit;
    font-size: 15px;
    font-style: italic;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--line);
    color: var(--ink-soft);
    padding: 4px 0 8px 38px;
    margin-bottom: 2px;
    resize: none;
    overflow: hidden;
    line-height: 1.4;
  }
  .item-note::placeholder { color: var(--ink-faint); }
  .item-note:focus { outline: none; border-bottom-color: var(--accent); }

  .week-task .check span::before {
    content: "◆ ";
    color: var(--accent);
    font-size: 12px;
    vertical-align: middle;
  }

  /* ---- questions ---- */
  .qfield { margin-bottom: 16px; }
  .qfield label {
    display: block;
    font-size: 15px;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .qfield input,
  textarea.notes,
  textarea.assess {
    width: 100%;
    font-family: inherit;
    font-size: 17px;
    color: var(--ink);
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px 12px;
  }
  .qfield input { min-height: 44px; }
  .qfield input:focus,
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea.notes, textarea.assess {
    min-height: 110px;
    resize: vertical;
    line-height: 1.5;
  }

  /* ---- notice / reference cards ---- */
  .note-card {
    background: var(--paper-2);
    border-left: 3px solid var(--accent-soft);
    padding: 14px 16px;
    margin-top: 14px;
  }
  .note-card h3 {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 8px;
    font-weight: 500;
  }
  .note-card ul {
    margin: 0;
    padding-left: 18px;
    color: var(--ink-soft);
    font-size: 16px;
  }
  .note-card li { margin-bottom: 4px; }

  /* ---- day nav ---- */
  .daynav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 36px;
    gap: 12px;
  }
  .daynav button {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: inherit;
    font-size: 16px;
    min-height: 48px;
    padding: 0 18px;
    cursor: pointer;
    border-radius: 2px;
  }
  .daynav button:disabled { color: var(--ink-faint); border-color: var(--paper-2); cursor: default; }
  .daynav .today-btn { color: var(--accent); border-color: var(--accent); }

  /* ---- week view ---- */
  .week-tabs {
    display: flex;
    gap: 6px;
    margin-top: 24px;
  }
  .week-tabs button {
    flex: 1;
    min-height: 44px;
    background: none;
    border: 1px solid var(--line);
    font-family: inherit;
    font-size: 15px;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 2px;
    padding: 6px 4px;
  }
  .week-tabs button.active {
    border-color: var(--accent);
    color: var(--ink);
    background: var(--accent-soft);
  }
  table.days {
    width: 100%;
    border-collapse: collapse;
    margin-top: 22px;
  }
  table.days th {
    text-align: left;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
    border-bottom: 1px solid var(--line);
    padding: 8px 4px;
  }
  table.days td {
    border-bottom: 1px solid var(--line);
    padding: 0;
  }
  table.days td .row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 17px;
    color: var(--ink);
    text-align: left;
    min-height: 48px;
    padding: 6px 4px;
    cursor: pointer;
  }
  table.days td .row .d-no { width: 70px; flex: 0 0 auto; }
  table.days td .row .d-date { color: var(--ink-faint); font-size: 14px; flex: 1; }
  table.days td .minibar {
    width: 80px;
    flex: 0 0 auto;
    height: 5px;
    background: var(--paper-2);
    border-radius: 3px;
    overflow: hidden;
  }
  table.days td .minibar > i { display: block; height: 100%; background: var(--accent); }
  table.days td .row .d-pct { width: 44px; text-align: right; font-size: 14px; color: var(--ink-soft); flex: 0 0 auto; }
  tr.is-today .row .d-no { color: var(--accent); font-weight: 500; }

  .save-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 12px;
  }
  .save-note { font-size: 14px; color: var(--accent); opacity: 0; transition: opacity 0.2s; }
  .save-note.show { opacity: 1; }

  /* ---- overview ---- */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    margin-top: 22px;
  }
  .stat {
    background: var(--paper);
    padding: 16px 12px;
    text-align: center;
  }
  .stat .big { font-size: 28px; font-weight: 400; }
  .stat .lbl { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); margin-top: 2px; }

  .overall-bar { margin-top: 22px; }

  /* ---- overview journey (gentle, no metrics) ---- */
  .journey { margin-top: 30px; }
  .journey-path {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 18px;
    margin-bottom: 22px;
  }
  .jweek { display: flex; gap: 9px; }
  .jdot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    box-sizing: border-box;
    flex: 0 0 auto;
  }
  .jdot.rest { background: var(--accent-soft); border-color: var(--accent-soft); }
  .jdot.done { background: var(--accent); border-color: var(--accent); }
  .jdot.today { box-shadow: 0 0 0 3px var(--accent-soft); border-color: var(--accent); }
  .journey-line {
    font-size: 20px;
    font-style: italic;
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 8px;
  }
  .journey-sub { color: var(--ink-soft); font-size: 15px; margin: 0; }

  .reference details {
    border-bottom: 1px solid var(--line);
    padding: 6px 0;
  }
  .reference summary {
    cursor: pointer;
    font-size: 15px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 8px 0;
    list-style: none;
  }
  .reference summary::-webkit-details-marker { display: none; }
  .reference summary::before { content: "+ "; color: var(--accent); }
  .reference details[open] summary::before { content: "– "; }
  .reference ul { margin: 4px 0 12px; padding-left: 18px; color: var(--ink-soft); font-size: 16px; }
  .reference li { margin-bottom: 6px; }

  .closing {
    margin-top: 30px;
    padding: 18px 0;
    border-top: 1px solid var(--line);
    font-style: italic;
    color: var(--ink-soft);
  }

  /* ---- about ---- */
  .about-lede {
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 16px;
  }
  .about-week {
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .about-week .aw-label {
    color: var(--accent);
    font-weight: 500;
  }
  .about-week .aw-range {
    font-size: 14px;
    color: var(--ink-faint);
  }
  .about-week .aw-phase {
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 2px;
  }

  .danger-link {
    background: none; border: none; color: var(--ink-faint);
    font-family: inherit; font-size: 14px; cursor: pointer;
    text-decoration: underline; padding: 4px 0; margin-top: 30px;
  }

  hr.soft { border: none; border-top: 1px solid var(--line); margin: 30px 0; }

  /* ---- morning recalibration ---- */
  .section-title .ex-time {
    float: right;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
    font-weight: 400;
  }
  .ex-intro { font-size: 15px; font-style: italic; margin: 8px 0 16px; }
  .field-hint { font-size: 13px; color: var(--ink-faint); font-style: italic; margin-top: 4px; }

  .pred-evening {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .outcome-pills { display: flex; gap: 4px; flex: 0 0 auto; }
  .pill {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 13px;
    min-height: 32px;
    padding: 0 12px;
    border-radius: 16px;
    cursor: pointer;
  }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pred-evening input[data-role="pred-happened"] {
    flex: 1;
    min-width: 160px;
    font-family: inherit;
    font-size: 15px;
    font-style: italic;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--line);
    color: var(--ink-soft);
    padding: 4px 0;
  }
  .pred-evening input[data-role="pred-happened"]:focus { outline: none; border-bottom-color: var(--accent); }

  .scenario {
    background: var(--paper-2);
    border-left: 3px solid var(--accent-soft);
    padding: 12px 16px;
    margin-top: 12px;
    transition: border-color 0.2s;
  }
  .scenario.sat { border-left-color: var(--accent); }
  .scenario .sc-stem { margin: 0 0 6px; }
  .scenario .sc-res { margin: 0 0 6px; color: var(--accent); font-style: italic; }
  .scenario .sc-check { min-height: 36px; padding: 4px 0; }
  .scenario .sc-check span { font-size: 15px; color: var(--ink-soft); }
  ol.sentences { margin: 8px 0 16px; padding-left: 22px; }
  ol.sentences li {
    margin: 0 0 12px;
    padding-left: 6px;
    line-height: 1.6;
    color: var(--ink);
  }
  ol.sentences li::marker { color: var(--accent); }

  .custom-sc {
    border-top: 1px solid var(--line);
    padding-top: 12px;
    margin-top: 12px;
  }
  details.own-sc { margin-top: 14px; }
  details.own-sc > summary {
    cursor: pointer;
    font-size: 15px;
    color: var(--ink-soft);
    list-style: none;
  }
  details.own-sc > summary::-webkit-details-marker { display: none; }
  details.own-sc > summary::before { content: "+ "; color: var(--accent); }
  details.own-sc[open] > summary::before { content: "– "; }
</style>
</head>
<body>
  <header class="topbar" id="topbar" hidden>
    <div class="topbar-inner">
      <div class="brand-row">
        <div class="brand">Recovery · 3 Weeks</div>
        <div class="sync" id="syncStatus"></div>
        <span class="sync" id="cloudBadge"></span>
      </div>
      <nav class="views">
        <button data-view="day">Day</button>
        <button data-view="week">Week</button>
        <button data-view="overview">Overview</button>
        <button data-view="morning">Morning</button>
        <button data-view="about">About</button>
      </nav>
    </div>
    <div class="reconnect-banner" id="reconnectBanner" hidden>
      <span>Your saved file needs permission again to keep syncing.</span>
      <button id="reconnectBtn">Reconnect</button>
    </div>
    <div class="reconnect-banner" id="mReconnectBanner" hidden>
      <span>Your saved morning file needs permission again to keep syncing.</span>
      <button id="mReconnectBtn">Reconnect</button>
    </div>
  </header>

  <main class="wrap" id="app"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";

/* ============================================================
   PLAN DATA  (hardcoded from the 3-Week Burnout Recovery Plan)
   ============================================================ */
const SECTIONS = ["Morning", "Midday", "Afternoon", "Evening"];

const WEEKS = {
  1: {

    range: "Days 1–7",
    phase: "Wake naturally. Move gently. Let the emergency mode fade.",
    routine: {

        "No work email, no Slack, no checking anything",

      ]
    },
    weekTasks: [
      "Find and book a craniosacral therapist — aim for first session by day 5–7",
      "Research one therapist for psychological support — just research, no pressure to book yet"
    ],
    reminders: ["No planning about NZ, career, or future"],
    markers: [
      "Sleep starts feeling deeper by day 4–5",
      "Crying may increase early in the week then taper",
      "Morning stomach anxiety may lessen slightly",
      "You might feel bored — that's good, it means the emergency mode is fading"
    ]
  },
  2: {
    title: "Gentle Reintroduction",
    range: "Days 8–14",
    phase: "A little more movement. One small task a day, only if it feels manageable.",
    routine: {
      Morning: [
        "Wake naturally or set a soft alarm if rhythm is forming",
        "Glass of water",
        "15 min stretching or yoga — can be slightly more active this week",
        "Morning recalibration exercises (15 min)",
        "Breakfast with protein"
      ],
      Midday: [
        "45–60 min walk, or swim if available (swimming is ideal — full body, low impact, soothing)",
        "Lunch",
        "One light bodyweight session — twice this week (squats, push-ups, planks; 15–20 min, stop before fatigue)"
      ],
      Afternoon: [
        "One enjoyable activity: cook a new recipe, play guitar, sing, visit a park, sit near animals",
        "One small task if energy allows: book the therapist, sort one admin thing, or a CS degree module — max one per day, only if manageable"
      ],
      Evening: [
        "Dinner",
        "Prediction log",
        "Light reading or music",
        "Sleep"
      ]
    },
    weekTasks: [
      "Craniosacral session (second appointment)",
      "First therapy session if possible",
      "One social outing — only if someone you actually like is available (not obligatory)"
    ],
    reminders: ["Still no NZ planning or work email"],
    markers: [
      "Sleep quality improving",
      "Facial swelling may start reducing",
      "Moments of spontaneous calm — brief, but new",
      "Appetite may normalize",
      "Guilt about resting should be quieter than week 1"
    ]
  },
  3: {
    title: "Rebuild Rhythm",
    range: "Days 15–21",
    phase: "A roughly consistent shape to the day. Light future-thinking, contained.",

function normalize(s) {
  s = s || {};
  const days = s.days || {};
  // ensure per-day shape + migrate legacy "skips" into per-item notes
  for (const d in days) {
    const day = days[d];
    day.items = day.items || {};
    day.questions = day.questions || {};
    day.itemNotes = day.itemNotes || {};
    if (typeof day.notes !== "string") day.notes = "";
    if (typeof day.synchronicities !== "string") day.synchronicities = "";
    if (day.skips) {
      for (const k in day.skips) {
        if (day.skips[k] && !day.itemNotes[k]) day.itemNotes[k] = day.skips[k];
      }
      delete day.skips;
    }
  }
  // Rebuild with a deterministic, readable key order; itemIndex is the legend
  // that lets each item ID in `days` be read without consulting the source.
  return {
    startDate: s.startDate || null,
    itemIndex: buildItemIndex(),
    days: days,
    weekAssessments: s.weekAssessments || { 1: "", 2: "", 3: "" },
    totalAssessment: s.totalAssessment || ""
  };
}

}

/* ============================================================
   DATE / DAY HELPERS
   ============================================================ */
function weekOf(day) { return Math.ceil(day / 7); }
function isFirstDayOfWeek(day) { return (day - 1) % 7 === 0; }

function midnightToday() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}
function computeCurrentDay() {
  if (!state.startDate) return 1;
  const start = new Date(state.startDate);
  const diff = Math.floor((midnightToday() - start) / 86400000) + 1;
  return Math.max(1, Math.min(TOTAL_DAYS, diff));
}
function dateForDay(day) {
  if (!state.startDate) return null;
  const start = new Date(state.startDate);
  const d = new Date(start.getTime());
  d.setDate(d.getDate() + (day - 1));
  return d;
}
function fmtDate(d) {
  if (!d) return "";
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}

/* ---- calendar-date helpers for the open-ended morning log ---- */
function isoDate(d) {
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}
function isoToday() { return isoDate(midnightToday()); }
function dateFromIso(s) {
  const p = String(s).split("-").map(Number);
  return new Date(p[0], (p[1] || 1) - 1, p[2] || 1);
}
function shiftIso(iso, deltaDays) {
  const d = dateFromIso(iso);
  d.setDate(d.getDate() + deltaDays);
  return isoDate(d);
}
function fmtLongDate(d) {
  if (!d) return "";
  return d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
}
// 1-based practice day number, anchored to firstPracticeDate (or today if unset).
function practiceDayNumber(iso) {
  const anchor = morningState.firstPracticeDate || isoToday();
  const diff = Math.floor((dateFromIso(iso) - dateFromIso(anchor)) / 86400000) + 1;
  return Math.max(1, diff);
}
// Scenario phase: 1 = Week 1 set (days 1–7), 2 = Week 2 set (8–14), 3 = your own (15+).
function scenarioPhase(dayNo) { return dayNo <= 7 ? 1 : (dayNo <= 14 ? 2 : 3); }

/* ============================================================
   ITEM MODEL  (which items exist for a given day)
   ============================================================ */
// Single source of truth for item IDs — used by both itemsForDay and the legend
function routineId(wk, sec, i) { return `w${wk}-${sec}-${i}`; }
function taskId(wk, i) { return `w${wk}-task-${i}`; }

function itemsForDay(day) {
  const wk = weekOf(day);
  const w = WEEKS[wk];
  const out = []; // {id, label, section, isTask}
  SECTIONS.forEach(sec => {
    w.routine[sec].forEach((label, i) => {
      out.push({ id: routineId(wk, sec, i), label, section: sec, isTask: false });
    });
  });
  if (isFirstDayOfWeek(day)) {
    w.weekTasks.forEach((label, i) => {
      out.push({ id: taskId(wk, i), label, section: "This week", isTask: true });
    });
  }
  return out;
}

// A readable legend mapping every item ID -> {week, section, position, label}.
// Regenerated from WEEKS on every load so it can never drift from the plan.
function buildItemIndex() {
  const idx = {};
  [1, 2, 3].forEach(wk => {
    const w = WEEKS[wk];
    SECTIONS.forEach(sec => {
      w.routine[sec].forEach((label, i) => {
        idx[routineId(wk, sec, i)] = { week: wk, section: sec, position: i, label };
      });
    });
    w.weekTasks.forEach((label, i) => {
      idx[taskId(wk, i)] = { week: wk, section: "This week", position: i, label };
    });
  });
  return idx;
}
function completionForDay(day) {
  const items = itemsForDay(day);
  if (!items.length) return { done: 0, total: 0, pct: 0 };
  const rec = state.days[day];
  let done = 0;
  if (rec && rec.items) items.forEach(it => { if (rec.items[it.id]) done++; });
  return { done, total: items.length, pct: Math.round((done / items.length) * 100) };
}

/* ============================================================
   ESCAPING
   ============================================================ */
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function autoGrow(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

        rec.items[id] = true;
        itemEl.classList.add("done");
      } else {
        delete rec.items[id];
        itemEl.classList.remove("done");
      }
      const noteEl = itemEl.querySelector(".item-note");
      if (noteEl) noteEl.placeholder = cb.checked
        ? "how did it go? (optional)"
        : "notes — why skipped, or anything to remember?";
      save();
      updateDayProgress(day);
    });
  });

  app.querySelectorAll('[data-role="note"]').forEach(inp => {
    autoGrow(inp);
    inp.addEventListener("input", () => {
      const id = inp.dataset.id;
      const v = inp.value;
      if (v) rec.itemNotes[id] = v; else delete rec.itemNotes[id];
      autoGrow(inp);
      save();
    });
  });

  app.querySelectorAll('[data-role="question"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const qid = inp.dataset.qid;
      const v = inp.value;
      if (v) rec.questions[qid] = v; else delete rec.questions[qid];
      save();
    });
  });

  const notes = app.querySelector('[data-role="notes"]');
  if (notes) notes.addEventListener("input", () => { rec.notes = notes.value; save(); });

  const sync = app.querySelector('[data-role="synchronicities"]');
  if (sync) sync.addEventListener("input", () => { rec.synchronicities = sync.value; save(); });

  const prev = document.getElementById("prevDay");
  if (prev) prev.addEventListener("click", () => { if (currentDay > 1) { currentDay--; render(); } });
  const next = document.getElementById("nextDay");
  if (next) next.addEventListener("click", () => { if (currentDay < TOTAL_DAYS) { currentDay++; render(); } });
  const tdy = document.getElementById("goToday");
  if (tdy) tdy.addEventListener("click", () => { currentDay = computeCurrentDay(); render(); });
}

/* ============================================================
   LOCAL FILE SYNC  (File System Access API + IndexedDB handle)
   ============================================================ */
const FS_SUPPORTED = typeof window !== "undefined" && "showSaveFilePicker" in window;
let fileHandle = null;     // active, permission-granted handle
let pendingHandle = null;  // stored handle awaiting re-permission
let fileName = "";
let syncState = "none";    // none | saving | saved | error | reconnect
let writeTimer = null;

function setSync(s) { syncState = s; updateSyncUI(); }

function fsStatusText() {
  if (!FS_SUPPORTED) return "This browser can't auto-sync to a file. Your data is saved in this browser — use Export JSON to back it up. (Auto-sync works in Chrome and Edge.)";
  if (fileHandle) return "Auto-syncing every change to “" + fileName + "”. Your data lives in that file on disk.";
  if (pendingHandle) return "A saved file is linked but needs permission again. Click Reconnect to resume syncing.";
  return "Pick a JSON file to auto-save your data to disk — the app keeps it updated on every change.";
}

function updateSyncUI() {
  const banner = document.getElementById("reconnectBanner");
  if (banner) banner.hidden = !(syncState === "reconnect" || (pendingHandle && !fileHandle));
  const el = document.getElementById("syncStatus");
  if (el) {
    let t = "";
    if (fileHandle) {
      if (syncState === "saving") t = "⋯ saving…";
      else if (syncState === "error") t = "⚠ save failed";
      else t = "● " + fileName;
    } else if (pendingHandle) {
      t = "⚠ reconnect file";
    }
    el.textContent = t;
    el.className = "sync" + (syncState === "error" ? " err" : "");
  }
  const ov = document.getElementById("fsStatus");
  if (ov) ov.textContent = fsStatusText();
}

function scheduleFileWrite() {
  if (!fileHandle) return;
  clearTimeout(writeTimer);
  setSync("saving");
  writeTimer = setTimeout(() => writeFile(false), 500);
}

async function writeFile(canPrompt) {
  if (!fileHandle) return;
  try {
    let perm = await fileHandle.queryPermission({ mode: "readwrite" });
    if (perm !== "granted" && canPrompt) perm = await fileHandle.requestPermission({ mode: "readwrite" });
    if (perm !== "granted") { setSync("reconnect"); return; }
    const w = await fileHandle.createWritable();
    await w.write(JSON.stringify(state, null, 2));
    await w.close();
    setSync("saved");
  } catch (e) {
    setSync("error");
  }
}

async function loadFromFile() {
  try {
    const f = await fileHandle.getFile();
    if (f.size > 0) {
      const parsed = JSON.parse(await f.text());
      if (parsed && typeof parsed === "object" && "startDate" in parsed) {
        state = normalize(parsed);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      }
    }
    fileName = fileHandle.name;
    setSync("saved");
  } catch (e) {
    setSync("error");
  }
}

async function connectFile() {
  if (!FS_SUPPORTED) return;
  let handle;
  try {
    handle = await window.showSaveFilePicker({
      suggestedName: "recovery.json",
      types: [{ description: "JSON file", accept: { "application/json": [".json"] } }]
    });
  } catch (e) { return; } // user cancelled

  let loaded = false;
  try {
    const f = await handle.getFile();
    if (f.size > 0) {
      const parsed = JSON.parse(await f.text());
      if (parsed && typeof parsed === "object" && parsed.startDate) {
        const fresh = !state.startDate;
        if (fresh || confirm("This file already contains saved data.\n\nOK = load it into this browser (replaces current data).\nCancel = overwrite the file with your current data.")) {
          state = normalize(parsed);
          loaded = true;
        }
      }
    }
  } catch (e) { /* empty or unreadable — we'll overwrite */ }

  fileHandle = handle;
  pendingHandle = null;
  fileName = handle.name;
  try { await storeHandle(handle); } catch (e) {}
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  await writeFile(true);
  if (loaded) { currentView = "day"; currentDay = computeCurrentDay(); }
  render();
}

async function reconnectFile() {
  const h = fileHandle || pendingHandle;
  if (!h) return;
  try {
    const perm = await h.requestPermission({ mode: "readwrite" });
    if (perm === "granted") {
      fileHandle = h;
      pendingHandle = null;
      fileName = h.name;
      await loadFromFile();
      currentDay = computeCurrentDay();
      render();
    }
  } catch (e) {}
}

async function disconnectFile() {
  fileHandle = null;
  pendingHandle = null;
  fileName = "";
  setSync("none");
  try { await clearHandle(); } catch (e) {}
  render();
}

/* ---- IndexedDB: persist the file handle across sessions ---- */
function idb() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("recovery_fs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("handles");
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function storeHandle(h) {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction("handles", "readwrite");
    tx.objectStore("handles").put(h, "file");
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function getStoredHandle() {
  const db = await idb();
  return new Promise(res => {
    const tx = db.transaction("handles", "readonly");
    const rq = tx.objectStore("handles").get("file");
    rq.onsuccess = () => res(rq.result || null);
    rq.onerror = () => res(null);
  });
}
async function clearHandle() {
  const db = await idb();
  return new Promise(res => {
    const tx = db.transaction("handles", "readwrite");
    tx.objectStore("handles").delete("file");
    tx.oncomplete = res; tx.onerror = res;
  });
}

   ============================================================ */
// Non-persisting read: returns the stored day or a fresh default without
// creating an empty record (so merely viewing a day doesn't "touch" it).
function getMorningDay(iso) {
  return morningState.days[iso] || normalizeMorningDay({});
}
function morningCompletion(iso) {
  const rec = getMorningDay(iso);
  const phase = scenarioPhase(practiceDayNumber(iso));
  let done = 0;
  const total = phase >= 2 ? 5 : 4;
  if (rec.predictions.every(p => p.text.trim())) done++;
  if (phase === 3) {
    if (rec.customScenarios.some(c => (c.trigger || "").trim() && (c.benign || "").trim())) done++;
  } else {
    if (SCENARIO_SETS[phase].every(sc => rec.scenarios[sc.id])) done++;
  }
  if (AUDIT_FIELDS.every(f => (rec.audit[f.id] || "").trim())) done++;
  if (rec.sang) done++;
  if (phase >= 2 && rec.sentences.morning && rec.sentences.evening) done++;
  return { done, total, pct: Math.round((done / total) * 100) };
}

function bindMorning(iso) {
  const get = () => ensureMorningDay(iso);   // persisting accessor for edits
  const touch = () => { markMorningStarted(); saveMorning(); updateMorningProgress(iso); };

  // Exercise 1 — predictions
  app.querySelectorAll('[data-role="pred-text"]').forEach(inp => {
    inp.addEventListener("input", () => { get().predictions[+inp.dataset.i].text = inp.value; touch(); });
  });
  app.querySelectorAll('[data-role="pred-happened"]').forEach(inp => {
    inp.addEventListener("input", () => { get().predictions[+inp.dataset.i].happened = inp.value; touch(); });
  });
  app.querySelectorAll('[data-role="pred-outcome"]').forEach(btn => {
    btn.addEventListener("click", () => {
      const i = +btn.dataset.i, o = btn.dataset.outcome;
      const pred = get().predictions[i];
      pred.outcome = pred.outcome === o ? "" : o;   // toggle off if re-clicked
      btn.parentElement.querySelectorAll(".pill").forEach(p => {
        p.classList.toggle("active", p.dataset.outcome === pred.outcome);
      });
      touch();
    });
  });

  // Exercise 2 — preset scenarios
  app.querySelectorAll('[data-role="scenario"]').forEach(cb => {
    cb.addEventListener("change", () => {
      const id = cb.dataset.id;
      if (cb.checked) get().scenarios[id] = true; else delete get().scenarios[id];
      cb.closest(".scenario").classList.toggle("sat", cb.checked);
      touch();
    });
  });
  // Exercise 2 — custom scenarios
  app.querySelectorAll('[data-role="cs-trigger"]').forEach(inp => {
    inp.addEventListener("input", () => { get().customScenarios[+inp.dataset.i].trigger = inp.value; touch(); });
  });
  app.querySelectorAll('[data-role="cs-threat"]').forEach(t => {
    autoGrow(t);
    t.addEventListener("input", () => { get().customScenarios[+t.dataset.i].threat = t.value; autoGrow(t); touch(); });
  });
  app.querySelectorAll('[data-role="cs-benign"]').forEach(t => {
    autoGrow(t);
    t.addEventListener("input", () => { get().customScenarios[+t.dataset.i].benign = t.value; autoGrow(t); touch(); });
  });
  app.querySelectorAll('[data-role="cs-remove"]').forEach(btn => {
    btn.addEventListener("click", () => { get().customScenarios.splice(+btn.dataset.i, 1); markMorningStarted(); saveMorning(); render(); });
  });
  const csAdd = document.getElementById("csAdd");
  if (csAdd) csAdd.addEventListener("click", () => {
    get().customScenarios.push({ trigger: "", threat: "", benign: "" });
    markMorningStarted(); saveMorning(); render();
  });

  // Exercise 3 — audit
  app.querySelectorAll('[data-role="audit"]').forEach(el => {
    if (el.tagName === "TEXTAREA") autoGrow(el);
    el.addEventListener("input", () => {
      const id = el.dataset.aid, v = el.value;
      if (v) get().audit[id] = v; else delete get().audit[id];
      if (el.tagName === "TEXTAREA") autoGrow(el);
      touch();
    });
  });

  // Exercise 4 — singing
  const sang = app.querySelector('[data-role="sang"]');
  if (sang) sang.addEventListener("change", () => {
    get().sang = sang.checked;
    sang.closest(".item").classList.toggle("done", sang.checked);
    touch();
  });

  // Exercise 5 — seven sentences
  app.querySelectorAll('[data-role="sentences"]').forEach(cb => {
    cb.addEventListener("change", () => {
      get().sentences[cb.dataset.when] = cb.checked;
      cb.closest(".item").classList.toggle("done", cb.checked);
      touch();
    });
  });

  // Evening close
  const ev = app.querySelector('[data-role="evening-text"]');
  if (ev) { autoGrow(ev); ev.addEventListener("input", () => { get().eveningClose.didNotHappen = ev.value; autoGrow(ev); touch(); }); }
  const evAcc = app.querySelector('[data-role="evening-accurate"]');
  if (evAcc) evAcc.addEventListener("change", () => {
    get().eveningClose.allAccurate = evAcc.checked;
    evAcc.closest(".item").classList.toggle("done", evAcc.checked);
    touch();
  });

  // Date nav
  const prev = document.getElementById("mPrevDay");
  if (prev) prev.addEventListener("click", () => { morningDate = shiftIso(morningDate, -1); render(); });
  const next = document.getElementById("mNextDay");
  if (next) next.addEventListener("click", () => { if (morningDate < isoToday()) { morningDate = shiftIso(morningDate, 1); render(); } });
  const tdy = document.getElementById("mToday");
  if (tdy) tdy.addEventListener("click", () => { morningDate = isoToday(); render(); });

  // File buttons
  const fsBtns = document.getElementById("morningFsButtons");
  if (fsBtns) {
    if (!FS_SUPPORTED) fsBtns.innerHTML = "";
    else if (mFileHandle) fsBtns.innerHTML = '<button class="btn ghost" id="mFsChange">Change file</button><button class="danger-link" id="mFsDisconnect" style="margin:0;">Disconnect</button>';
    else if (mPendingHandle) fsBtns.innerHTML = '<button class="btn" id="mFsReconnect">Reconnect file</button>';
    else fsBtns.innerHTML = '<button class="btn" id="mFsConnect">Connect a JSON file</button>';
  }
  const bindIf = (id, fn) => { const e = document.getElementById(id); if (e) e.addEventListener("click", fn); };
  bindIf("mFsConnect", connectMorningFile);
  bindIf("mFsChange", connectMorningFile);
  bindIf("mFsReconnect", reconnectMorningFile);
  bindIf("mFsDisconnect", disconnectMorningFile);
  const exp = document.getElementById("morningExportBtn");
  if (exp) exp.addEventListener("click", exportMorningJSON);
}

function updateMorningProgress(iso) {
  if (iso !== morningDate) return;
  const comp = morningCompletion(iso);
  const bar = document.getElementById("mBar");
  const pct = document.getElementById("mPct");
  if (bar) bar.style.width = comp.pct + "%";
  if (pct) pct.textContent = `${comp.done} of ${comp.total} exercises · ${comp.pct}%`;
}

function exportMorningJSON() {
  const blob = new Blob([JSON.stringify(morningState, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "morning.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ============================================================
   MORNING FILE SYNC  (its own handle + IndexedDB store)
   ============================================================ */
let mFileHandle = null;
let mPendingHandle = null;
let mFileName = "";
let mSyncState = "none";
let mWriteTimer = null;

function mSetSync(s) { mSyncState = s; updateMorningSyncUI(); }

function mFsStatusText() {
  if (!FS_SUPPORTED) return "This browser can't auto-sync to a file. Your morning log is saved in this browser — use Export JSON to back it up. (Auto-sync works in Chrome and Edge.)";
  if (mFileHandle) return "Auto-syncing every change to “" + mFileName + "”.";
  if (mPendingHandle) return "A saved morning file is linked but needs permission again. Click Reconnect to resume syncing.";
  return "Pick a JSON file to auto-save your morning log to disk — kept updated on every change. Separate from your recovery file.";
}

function updateMorningSyncUI() {
  const banner = document.getElementById("mReconnectBanner");
  if (banner) banner.hidden = !(mSyncState === "reconnect" || (mPendingHandle && !mFileHandle));
  const el = document.getElementById("morningSyncStatus");
  if (el) {
    let t = "";
    if (mFileHandle) t = mSyncState === "saving" ? "⋯ saving…" : mSyncState === "error" ? "⚠ save failed" : "● " + mFileName;
    else if (mPendingHandle) t = "⚠ reconnect file";
    el.textContent = t;
    el.className = "sync" + (mSyncState === "error" ? " err" : "");
  }
  const ov = document.getElementById("morningFsStatus");
  if (ov) ov.textContent = mFsStatusText();
}

function scheduleMorningFileWrite() {
  if (!mFileHandle) return;
  clearTimeout(mWriteTimer);
  mSetSync("saving");
  mWriteTimer = setTimeout(() => mWriteFile(false), 500);
}

async function mWriteFile(canPrompt) {
  if (!mFileHandle) return;
  try {
    let perm = await mFileHandle.queryPermission({ mode: "readwrite" });
    if (perm !== "granted" && canPrompt) perm = await mFileHandle.requestPermission({ mode: "readwrite" });
    if (perm !== "granted") { mSetSync("reconnect"); return; }
    const w = await mFileHandle.createWritable();
    await w.write(JSON.stringify(morningState, null, 2));
    await w.close();
    mSetSync("saved");
  } catch (e) { mSetSync("error"); }
}

async function mLoadFromFile() {
  try {
    const f = await mFileHandle.getFile();
    if (f.size > 0) {
      const parsed = JSON.parse(await f.text());
      if (parsed && typeof parsed === "object" && (parsed.kind === "morning_recalibration" || parsed.days)) {
        morningState = normalizeMorning(parsed);
        try { localStorage.setItem(MORNING_STORAGE_KEY, JSON.stringify(morningState)); } catch (e) {}
      }
    }
    mFileName = mFileHandle.name;
    mSetSync("saved");
  } catch (e) { mSetSync("error"); }
}

async function connectMorningFile() {
  if (!FS_SUPPORTED) return;
  let handle;
  try {
    handle = await window.showSaveFilePicker({
      suggestedName: "morning.json",
      types: [{ description: "JSON file", accept: { "application/json": [".json"] } }]
    });
  } catch (e) { return; }

  let loaded = false;
  try {
    const f = await handle.getFile();
    if (f.size > 0) {
      const parsed = JSON.parse(await f.text());
      if (parsed && typeof parsed === "object" && (parsed.kind === "morning_recalibration" || parsed.days)) {
        const fresh = Object.keys(morningState.days).length === 0 && !morningState.firstPracticeDate;
        if (fresh || confirm("This file already contains a saved morning log.\n\nOK = load it into this browser (replaces current data).\nCancel = overwrite the file with your current data.")) {
          morningState = normalizeMorning(parsed);
          loaded = true;
        }
      }
    }
  } catch (e) { /* empty or unreadable — we'll overwrite */ }

  mFileHandle = handle;
  mPendingHandle = null;
  mFileName = handle.name;
  try { await mStoreHandle(handle); } catch (e) {}
  try { localStorage.setItem(MORNING_STORAGE_KEY, JSON.stringify(morningState)); } catch (e) {}
  await mWriteFile(true);
  if (loaded) morningDate = isoToday();
  render();
}

async function reconnectMorningFile() {
  const h = mFileHandle || mPendingHandle;
  if (!h) return;
  try {
    const perm = await h.requestPermission({ mode: "readwrite" });
    if (perm === "granted") {
      mFileHandle = h;
      mPendingHandle = null;
      mFileName = h.name;
      await mLoadFromFile();
      render();
    }
  } catch (e) {}
}

async function disconnectMorningFile() {
  mFileHandle = null;
  mPendingHandle = null;
  mFileName = "";
  mSetSync("none");
  try { await mClearHandle(); } catch (e) {}
  render();
}

/* ---- IndexedDB: persist the morning file handle ---- */
function midb() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("morning_fs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("handles");
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function mStoreHandle(h) {
  const db = await midb();
  return new Promise((res, rej) => {
    const tx = db.transaction("handles", "readwrite");
    tx.objectStore("handles").put(h, "file");
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function mGetStoredHandle() {
  const db = await midb();
  return new Promise(res => {
    const tx = db.transaction("handles", "readonly");
    const rq = tx.objectStore("handles").get("file");
    rq.onsuccess = () => res(rq.result || null);
    rq.onerror = () => res(null);
  });
}
async function mClearHandle() {
  const db = await midb();
  return new Promise(res => {
    const tx = db.transaction("handles", "readwrite");
    tx.objectStore("handles").delete("file");
    tx.oncomplete = res; tx.onerror = res;
  });
}

/* ============================================================
   CLOUD SYNC  (Supabase: GitHub auth + private per-user rows)
   ============================================================ */
// Safe to be public: the anon key is designed to ship in the client, and the
// data is protected by login + row-level security on the app_data table.
const SUPABASE_URL = "https://rcftdramzykapbelilxf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjZnRkcmFtenlrYXBiZWxpbHhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODg1MzgsImV4cCI6MjA5NjY2NDUzOH0.e-xGD7eAis8eDTyHYclSvhUxUd2KlvK6D1FR2m_SYCo";
// Where GitHub sends you back after login. Must match Supabase URL config.
const APP_URL = location.origin + location.pathname;

let sb = null;
let cloudUser = null;
let cloudSync = "off";   // off | signedout | syncing | synced | error
let cloudErr = "";
let cloudPulling = false;
const cloudPushTimers = {};

function initSupabase() {
  if (sb) return sb;
  if (!window.supabase || !SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });
  return sb;
}

function cloudInit() {
  if (!initSupabase()) { cloudSync = "off"; updateCloudUI(); return; }
  cloudSync = "signedout";
  // Fires INITIAL_SESSION on load (restoring a saved session or processing the
  // GitHub redirect), then SIGNED_IN / SIGNED_OUT as auth changes.
  sb.auth.onAuthStateChange((event, session) => {
    if (event === "TOKEN_REFRESHED") { cloudUser = session ? session.user : null; return; }
    // Defer: running other supabase calls synchronously inside this callback can deadlock.
    setTimeout(() => cloudOnAuth(session), 0);
  });
}

async function cloudOnAuth(session) {
  cloudUser = session ? session.user : null;
  if (cloudUser) {
    cloudSync = "syncing"; updateCloudUI();
    await cloudPull();
    if (cloudSync !== "error") cloudSync = "synced";
    currentDay = computeCurrentDay();
    render();
  } else {
    cloudSync = "signedout";
    updateCloudUI();
  }
}

async function cloudPull() {
  if (!sb || !cloudUser || cloudPulling) return;
  cloudPulling = true;
  try {
    const { data, error } = await sb.from("app_data").select("key,data").in("key", ["recovery", "morning"]);
    if (error) throw error;
    const rows = {};
    (data || []).forEach(r => { rows[r.key] = r.data; });

    // Recovery: adopt remote if it exists, else seed remote from this device.
    if (rows.recovery && rows.recovery.startDate) {
      state = normalize(rows.recovery);
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    } else if (state.startDate) {
      await cloudPushNow("recovery", state);
    }

    // Morning: same pattern.
    if (rows.morning && (rows.morning.days || rows.morning.firstPracticeDate)) {
      morningState = normalizeMorning(rows.morning);
      try { localStorage.setItem(MORNING_STORAGE_KEY, JSON.stringify(morningState)); } catch (e) {}
    } else if (Object.keys(morningState.days || {}).length) {
      await cloudPushNow("morning", morningState);
    }
    cloudErr = "";
  } catch (e) {
    cloudSync = "error"; cloudErr = e.message || String(e);
  } finally {
    cloudPulling = false;
  }
}

async function cloudPushNow(key, data) {
  if (!sb || !cloudUser) return;
  try {
    cloudSync = "syncing"; updateCloudUI();
    const { error } = await sb.from("app_data").upsert(
      { user_id: cloudUser.id, key: key, data: data, updated_at: new Date().toISOString() },
      { onConflict: "user_id,key" }
    );
    if (error) throw error;
    cloudSync = "synced"; cloudErr = "";
  } catch (e) {
    cloudSync = "error"; cloudErr = e.message || String(e);
  }
  updateCloudUI();
}

// Debounced — coalesces rapid edits into one write per dataset.
function cloudPush(key, data) {
  if (!sb || !cloudUser) return;
  clearTimeout(cloudPushTimers[key]);
  cloudSync = "syncing"; updateCloudUI();
  cloudPushTimers[key] = setTimeout(() => cloudPushNow(key, data), 800);
}

async function cloudSignIn() {
  if (!initSupabase()) return;
  await sb.auth.signInWithOAuth({ provider: "github", options: { redirectTo: APP_URL } });
}

async function cloudSignOut() {
  if (!sb) return;
  await sb.auth.signOut();
  cloudUser = null; cloudSync = "signedout";
  render();
}

function cloudPanelHtml() {
  if (!SUPABASE_URL) return "";
  let inner;
  if (cloudSync === "off") {
    inner = `<p class="fs-status">Cloud sync is unavailable — the sync library didn't load. Check your connection and reload.</p>`;
  } else if (cloudUser) {
    const who = cloudUser.email || (cloudUser.user_metadata && cloudUser.user_metadata.user_name) || "your account";
    inner = `

      <p class="fs-status">Sign in with GitHub to sync your data privately across your laptop and phone. Your entries stay private to your account — they're never part of the public site.</p>
      <div class="save-row"><button class="btn" id="cloudSignIn">Sign in with GitHub</button></div>`;
  }
  return `<div class="section"><div class="section-title">Cloud sync</div>${inner}</div>`;
}

function bindCloudPanel() {
  const si = document.getElementById("cloudSignIn"); if (si) si.addEventListener("click", cloudSignIn);
  const so = document.getElementById("cloudSignOut"); if (so) so.addEventListener("click", cloudSignOut);
  updateCloudUI();
}

function updateCloudUI() {
  const el = document.getElementById("cloudStatus");
  if (el) {
    el.textContent = cloudSync === "syncing" ? "⋯ syncing…"
      : cloudSync === "error" ? ("⚠ sync error: " + cloudErr)
      : cloudSync === "synced" ? "● synced to your account" : "";
  }
  const badge = document.getElementById("cloudBadge");
  if (badge) {
    badge.textContent = !cloudUser ? "" : (cloudSync === "syncing" ? "☁⋯" : cloudSync === "error" ? "☁⚠" : "☁✓");
    badge.className = "sync" + (cloudSync === "error" ? " err" : "");
  }
}

        const perm = await h.queryPermission({ mode: "readwrite" });
        if (perm === "granted") { fileHandle = h; fileName = h.name; await loadFromFile(); }

  if (FS_SUPPORTED) {

      const h = await mGetStoredHandle();

        if (perm === "granted") { mFileHandle = h; mFileName = h.name; await mLoadFromFile(); }

  if (state.startDate) save();
  render();

  cloudInit();
}
